results_dir: logs/phase2_sapien_depth_capture

rotation_z_axis_deg: 0.0

extra_boxes:
  - name: runtime_box_0
    center: [0.85, 0.10, 0.125]
    size: [0.10, 0.25, 0.25]
  - name: runtime_box_1
    center: [0.60, -0.15, 0.25]
    size: [0.25, 0.25, 0.50]

camera_specs:
  - name: overhead_main
    width: 640
    height: 480
    fov_y_deg: 55.0
    position: [1.15, -0.85, 1.45]
    target: [0.55, 0.05, 0.40]
    near: 0.1
    far: 4.0
  - name: side_main
    width: 640
    height: 480
    fov_y_deg: 55.0
    position: [1.25, 0.55, 1.10]
    target: [0.50, 0.05, 0.45]
    near: 0.1
    far: 4.0

# If false, the script only exports scene/camera specs and does not attempt live capture.
attempt_live_capture: true
add_ground: false
capture_backend: stereo_depth_sensor

# Optional overrides for SAPIEN's StereoDepthSensorConfig.
# By default we keep the built-in D415-style stereo model and only match each camera's
# RGB resolution/intrinsics plus near/far range from `camera_specs`.
stereo_sensor_config: {}

robot:
  enabled: true
  # Franka Panda 7-DOF neutral configuration rendered with the fixed-gripper Panda URDF by default.
  gripper: true
  qpos: [0.0, -0.785398, 0.0, -2.356194, 0.0, 1.570796, 0.785398]

# Live capture output path used only when attempt_live_capture=true and SAPIEN is installed.
bundle_filename: depth_capture_bundle.npz
scene_spec_filename: scene_spec.yaml
capture_request_filename: capture_request.yaml
preview_dirname: depth_previews
preview_cmap: viridis
