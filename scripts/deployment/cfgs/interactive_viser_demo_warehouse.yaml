cfg_inference_path: scripts/inference/cfgs/config_EnvWarehouse-RobotPanda-config_file_v01_00.yaml
results_dir: logs/interactive_viser_demo

device: cuda:0
seed: 2
debug: false

env_id_override: EnvWarehouse
env_sdf_cell_size: 0.05

viser_host: 127.0.0.1
viser_port: 8080
viser_label: MPD Interactive Demo

reference_split: validation
reference_index: 1

# Leave q_start null to reuse the reference sample's start state.
q_start: null

# Leave ee_goal_pose null to reuse the reference sample's EE goal as the
# initial gizmo pose.
ee_goal_pose: null

extra_boxes:
  - name: runtime_box_0
    center: [0.85, 0.10, 0.125]
    size: [0.10, 0.25, 0.25]
  - name: runtime_box_1
    center: [0.60, -0.15, 0.25]
    size: [0.25, 0.25, 0.50]

n_ik_candidates: 128
max_goal_candidates: 4
ik_max_iterations: 500
ik_lr: 0.2
ik_se3_eps: 0.05

run_sapien: true
render_sapien_viewer: true
sapien_viewer_preset: isaac_gym_default
sapien_add_ground: false
sapien_scene_timestep: 0.004166666666666667
sapien_render_every_n_steps: 4
sapien_drive_stiffness: 200.0
sapien_drive_damping: 40.0
sapien_force_limit: 1000.0
sapien_drive_mode: force
sapien_balance_passive_force: true
sapien_compensate_gravity: true
sapien_compensate_coriolis_and_centrifugal: true
sapien_n_pre_steps: 5
sapien_n_post_steps: 10
sapien_robot:
  enabled: true
  fix_root_link: true

goal_gizmo_scale: 0.22
goal_axes_length: 0.16
goal_axes_radius: 0.01
show_robot_q_init: true
show_robot_q_init_collision: false
robot_q_init_sphere_margin: 0.0

runtime_state_filename: interactive_demo_state.yaml
plan_filename: interactive_plan.pt
draw_collision_spheres: false
save_ik_debug_plot_on_failure: true
show_ik_debug_plot: false
ik_debug_plot_filename: ik_debug.png
max_collision_free_to_render: 4
max_colliding_to_render: 4
